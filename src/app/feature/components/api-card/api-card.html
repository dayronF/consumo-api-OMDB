<div class="card" (click)="onSelect()">
  <div class="card__poster">
    <img 
      [src]="movie.Poster" 
      [alt]="movie.Title"
      (error)="onImageError($event)"
    >
    <span class="card__no-poster-text" [style.display]="'none'">Sin imagen</span>
  </div>

  <div class="card__info">
    <span class="card__type">{{ movie.Type }}</span>
    <h3 class="card__title">{{ movie.Title }}</h3>
    <p class="card__year">{{ movie.Year }}</p>
  </div>
</div>
